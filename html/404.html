<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Studiova</title>
  <link rel="shortcut icon" type="image/png" href="../assets/images/logos/favicon.svg" />
  <link rel="stylesheet" href="../assets/libs/owl.carousel/dist/assets/owl.carousel.min.css">
  <link rel="stylesheet" href="../assets/libs/aos-master/dist/aos.css">
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>

<body>

  <!--  Page Wrapper -->
  <div class="page-wrapper overflow-hidden">

    <!--  Get in touch Section -->
    <section
      class="bg-light-gray border-top border-primary border-4 d-flex align-items-center justify-content-center min-vh-100">
      <div class="container py-3">
        <div class="d-flex flex-column justify-content-center gap-8">
          <img src="" alt="404" width="550" class="img-fluid mx-auto"
            data-aos="zoom-in" data-aos-delay="100" data-aos-duration="1000" id = '404_con'>
          <h2 class="mb-0 text-center" data-aos="fade-up" data-aos-delay="200" data-aos-duration="1000">Oops! Page Not
            Found</h2>
          <a href="index.html" class="btn mx-auto" data-aos="fade-up" data-aos-delay="300" data-aos-duration="1000">
            <span class="btn-text">Back to Home</span>
            <iconify-icon icon="lucide:arrow-up-right"
              class="btn-icon bg-white text-dark round-52 rounded-circle hstack justify-content-center fs-7 shadow-sm"></iconify-icon>
          </a>
        </div>
      </div>
    </section>

  </div>

  <div class="get-template hstack gap-2">
    
    <button class="btn bg-primary p-2 round-52 rounded-circle hstack justify-content-center flex-shrink-0"
      id="scrollToTopBtn">
      <iconify-icon icon="lucide:arrow-up" class="fs-7 text-dark"></iconify-icon>
    </button>
  </div>


  <script src="../assets/libs/jquery/dist/jquery.min.js"></script>
  <script src="../assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/libs/owl.carousel/dist/owl.carousel.min.js"></script>
  <script src="../assets/libs/aos-master/dist/aos.js"></script>
  <script src="../assets/js/custom.js"></script>
  <!-- solar icons -->
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@1.0.8/dist/iconify-icon.min.js"></script>
  <script>
    async function startProcess() {
      try {
        const cachedBackgrounds = localStorage.getItem('backgrounds');
        let backgrounds = null;
        if (cachedBackgrounds) {
            backgrounds = JSON.parse(cachedBackgrounds);
        } else {
          console.log("Đang tải dữ liệu gốc từ Firebase...");
          const firestoreModule = await import('../assets/js/firestore.mjs');
          const { fetchDocuments } = firestoreModule;
          backgrounds = await fetchDocuments("backgrounds");
          console.log("Dữ liệu từ Firebase:", backgrounds);
          if (backgrounds && backgrounds.length > 0) {
            localStorage.setItem('backgrounds', JSON.stringify(backgrounds)); // PHẢI dùng JSON.stringify
          }
        }
        if (backgrounds && backgrounds.length > 0) {
          const container = document.getElementById('404_con');
          const foundImg = backgrounds.find(background => background.name == '404');
          if (!container) return;
          container.src = foundImg.img_link;
        }
      } catch (error) {
          console.error("Lỗi tiến trình xử lý backgrounds:", error);
          localStorage.removeItem('backgrounds');
      }
  }
  startProcess();
  </script>
  <div id="admin-speed-dial" class="admin-quick-link d-none" style="position: fixed; bottom: 15px; left: 15px; z-index: 9999; opacity: 0.3; transition: opacity 0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.3'">
    <a href="./admin.html" class="btn btn-sm btn-dark rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; box-shadow: 0 4px 10px rgba(0,0,0,0.15);" title="Go to Admin Dashboard">
        🛠️
    </a>
  </div>
</body>

</html>
